body:
  text: 李相國論事集卷六唐蔣偕編論鹽鐵月進元和七年鹽鐵使王播每月進奉錢帛數萬貫謂之月進李絳奏曰陛下新降德音斷四方正稅外進獻天下無不聞知海內無不歌詠事光史冊聲布華夏今鹽鐵使王播每月進納錢帛不知何以為進若奉公無私安得有餘羡之月進縱有餘羡亦是官錢固非割其祿俸又非貢其家財即所進之錢盡是官物祗合輸納有司不合進入內庫進官物結私恩外則自隳制書不可以示懲勸臣詳思所獻進退無補上損惟新之化下興衆庶之議伏請宣布王播巳後如有進奉並仰於户部送納即降詔與王播故終李絳在位更無進入內庫者遂盡納户部其唯理是從如是之速也論京西京北兩神策鎮遏軍事元和七年蕃寇徑至州城西門驅掠人畜而去朝廷憂之宰臣李絳因延英奏陳今邊上空虛兵非實數守將貪濫背公徇私虛人既多實兵須少力既不敵坐受傷殘今府藏未充國力猶闕未得廣添兵馬且須即日處置就其易行得效速者今京西京北並有神䇿軍鎮兵本置此者祗防蕃寇侵軼俾其禦難戰鬭也不使其鮮衣美食坐費衣糧爾今寇賊為患來如飄風去如驟雨兩京西節度使本兵既少須與鎮軍合勢掎角驅逐鎮軍須倍道急趨同力剪撲而牽屬左右神策須申狀取處分夫兵不內御須應機合變失之毫釐差以千里蕃寇方驅掠殺戮之際百姓塗於草莽方云入京逺取中尉處分何異暍渴而穿井待水餒饉而耕粟俟食豈可及事機乎縱其將領諳識事體星言應接緣是禁衛將士無懼節使之心進退前却號令不及既行刑不得則與失兵同今須便據所在境兵馬及衣糧器械割屬當道節度使法令畫一豐約齊同赴急如發機前戰不旋踵則兵威必振賊氣自消陛下無驚怠之憂生靈亡驅掠之患若安處無事之地坐仰厚賜之恩寇至以申狀為名不曾禦敵節將以理管成例待以平交徒有鎮遏之聲都無討逐之力聖恩便此處分實為久逺之制上曰朕比不知舊事如此何以得其然事便即宜處置其京西京北鎮軍皆元屬兩京為弊日久不樂割屬節度使競為阻事遂因循不行上言德宗朝事上嘗謂宰相曰朕小年在德宗左右見貞元中天下不理何故如此李絳對曰德宗自用聖智不任宰臣奏請皆有疑慮别結他門私恩信納事傾宰府公道不行所以下情不得上達當時人情頗亦思亂上曰不可盡歸怨於德宗朕以謂此是當時宰相之過德宗深在九重何由得盡知外事政之可否祗合是宰相執論一度不得至再三不得直至五六道理既當事實無私自然上意須回詳思至當豈有固守無理之事茍違重臣所請必不然也朕在當時不見宰臣執論公事至於再三者卿等皆須勵志不得順朕之錯必須執奏且至五六度不得謂朕怒怪便止不論卿等當悉之憲宗有此叙及處分是天縱聖明神授聰哲動臻理要深知物情可謂有君無臣間代之主也論邊事宰臣李絳嘗因延英論及邊事曰自古及今戎狄與中國並雖代有衰盛強弱然常須邊境備擬烽候精明雖繫頸屈膝而亭障未嘗一日弛其備也何者夷狄無親見利則進不知仁義惟務侵盜故強則寇掠弱則卑伏此其天性也是以聖王以羈縻勿絶待之其至也則驅除之其去也則嚴備之今北方蕃臣復多歷年載雖實有功於國家報之以厚施者巳倦求者未厭滿其志則曰事當宜爾悍氣益驕酌其中則曰效之難圖怨辭立至故印馬益廣望價轉多無厭之心實難為足若不如此異日必有不顧恩德為患封疆寇至而謀事則不及矣今西北兩都皆無備擬兵但虛數坐盜衣糧將無實效嵗邀官爵衣甲器械之數破官錢空有其名部伍訓練之方務酒樂都亡其制古者兵無二事志在殺敵將無異望專在誅寇器用犀利斥候精明若有煙塵負弩死戰若無驚急即營生業今則不然戰士採拾以供上命惟責程課不恤飢寒主將刻削以結內寵不輯戎事惟濟巳身今戎狄繼來婚嫁於國情實巨細必知邊塞空虛有無咸悉至於山川要害道塗險易已皆探知熟習委曲諳識脫或見利忘義因便乘間風塵暴至羽檄交馳急詔徵兵無及係纍之方閉壁逃禍寧救驅掠之災使邊人仰天而呼望國而泣蓄甲不足以衛疆場命將不足以扼寇讎此聖主所宜圖之不可忘於終食之間也伏望詔勑邊鎮節度俾其虛實有無少闕事宜分辨聞奏仍請於八座丞郎兩省中選擇公忠清訪問事理一時上聞然後申明制度增緝募兵謹其殿最行其賞罰罪在不捨刑罰必加功有可褒爵賞必及如此則陛下高枕邊人永寧古人曰備豫不虞有備無患此經國之常制也上驚曰今邊上豈如此空虛也卿等便令㸃檢切為殿最時天德軍中城舊屬振武有鎮兵四百人其時却割屬天德軍交割惟有十人并軍將在此其器械惟有弓一張餘可知也數月後李絳罷相遂因循舊弊夏中對宰臣上於延英對宰臣等時盛夏煩暑上汗流御服透濕宰臣等奏事畢起上留卿等且坐乃話國朝故事日高宰臣等奏日高伏恐聖體勞倦上曰朕歸宫中巳後惟是宦官婦人更與何人語論所貴與卿等語言稱論政要亦是樂也上言外戚事宰臣延英奏事畢因言及前古外戚專寵害政上曰朕每以此為監外戚不惟止於無權未嘗假其顔色正為此也宰臣等曰鑒往古之失立當今之制事光千古道冠百王今妃后家外戚之勢向外都不知有祗畏恭慎常恐有違至於職位賜與賓客豈惟無敢踰制實亦不逮常人所以自陛下臨御巳來后族戚里之家無一人有犯法懲責蓋制於未然之所致也上甚悅曰今豈得如此乎若有踰越朕必寬捨此却是安全外戚之道也宰臣陳賀曰陛下簡御外戚之道從古帝王無及今者聖㫖𢎞逺睿政光昭可埀萬代之法也上言開元天寶事宰臣於延英殿論政事畢因言及國朝故事上曰朕覽𤣥宗實録見開元初事天下不得不理𤣥宗初即位親見不理之由遂鋭意為政有姚崇宋璟蘇頲等輔弼左右履政奉公聖賢即合魚水相得緣何而不至於理及天寶末年𤣥宗怠倦為政務於不急之事有李林甫陳希烈楊國忠等姦敗傾陷專權徇私楊氏一門競為禍本又何因而不至於亂前事是今日之龜鑑朕當自惕勵卿等各以此為誡庶幾免於此也宰臣等兢惕踧踖拜賀聖言皆洞理亂之本也上言須惜官上於延英殿謂宰臣曰古人言官不必備惟其人卿各有親故則必冗食者卿當與朕惜官以引公道吉甫奏曰臣每用一官未嘗不訪於公議有堪奬進然敢奏陳至於親故不敢援引權德輿曰臣寡親故亦不敢進用今奉宣亦更不敢有違㫖李絳曰至公之道實無親疏惟觀其人才與職位相當若有才用雖是親故亦合進用昔建中初德宗臨御天下崔祐甫為相半年之內除官八百餘員德宗謂祐甫曰卿除授大多又聞多是親故何也祐甫對曰所問當與不當不看多之與少其是臣親故方諳知其才器尚不敢用其不諳者安敢與官德宗賞其言衆以謂所對公當至今人稱之天后朝命官猥多當時有車載㪷量之語及開元中在朝赫赫有名望事績者多是天后所進之人古言措十失五猶得其半若拱默避情故之嫌使聖朝闕濟濟多士之美是依違容悅之臣非聖主至公委任之道也若於位實乖情故何驗臣豈敢逃責以妨賢路上曰如卿所言至公之道不論多少祗在至當爾卿當我倚任勿責斯言論採擇事元和八年冬教坊使忽於外間採擇人家子女及有别室妓人皆取以入云奉密詔衆議喧然宰臣李絳顧謂同列武元衡李吉甫此事大虧損聖德須有諫論吉甫曰此嗜欲間事難言從諫官上疏李絳曰君常稱美相公常病諌官論事為難則權與諫官可乎且君為元首臣作股肱豈事有不合論者吉甫曰少閒待敕使出宣事便諷之可乎李絳曰敕使避事却不敢言出臣下口入聖耳詎可因人言乎二相公皆舊人碩德誠合保重如絳蒙不次之恩受非常之遇顧以凡器起居相位無以塞責獲罪為幸輒自上疏不敢有纍相公遂草疏極言採擇之弊曰今日之理實所可惜流布四方虧損聖德伏恐不敢言者臣過蒙厚恩無禆盛化敢陳愚瞽伏希察納草狀畢李武並云請狀一看可乎李絳曰此是公狀何敢有隱兩相遂共讀之皆泫然曰不知相公捐軀許國如此雖兩漢章疏何以過此明日延英對見上舉手謂李絳曰昨日見卿狀所論採擇事非卿盡忠於朕何以及此朕都不知向外事宜是教坊使罪過不喻朕意以至於此朕緣丹王巳下四人院中都無侍者朕令其於樂官中及閭里有情願者厚與其父母錢帛祗取四人四王各與一人伊不㑹朕意便敢如此攪擾人家合有科責朕已重罰矣其所取人並放歸家訖若非是卿發言朕寧知過失忠益誠盡深嘉乃心朕常居深宫不知外事巳後脫有處分不合事宜卿須依此論陳不得遂成朕錯朕或有得卿所奏暫未諭守所見未從其理直須兩度三度懇論以至於五六朕方兾開悟以道理歸當為限卿等常宜以此為懷於是並起謝恩至於感泣退歸二相謂李絳豈知此太宗實録中且無此事相公事君之道為臣之節極是矣實慙不逮有愧於懷及晚出中書其先所取人並放歸家在於道路比堯舜禹湯之德若書之簡策足以彰示萬古豈尋常帝王可望清光哉李相國論事集卷六
