body:
  text: 李相國論事集巻四唐蔣偕編論易定事宜學士李絳奏曰臣訪聞易定事宜今實蹙迫人情惶駭迪簡憂危蓋緣府庫空虚村鄉匱竭賞給將士徒設空言宻近強鄰勢有反變况易定地當要害深在河北腹中此鎮不可不存此急不可不救又聞迪簡以衣糧闕絶解還軍徒至多以臣愚慮便恐致亂何者易定舉軍歸國將謂從此保安今乃困迫於前時退散於今日懼怨恨之輩潛蓄姦謀鄰道誘扇便生變故事若一失豈可復收欲令諸道可以効順以此之故不可不憂今所賜綾絹五萬疋臣竊恐太少賞給用度未濟事機伏望聖恩更賜五萬疋通前十萬疋即兾救其急切副彼憂危稍恱人心永引國計安危所繫不敢不陳宣依所奏鎮州淮西事宜學士奏臣等前後陳奏縷盡利害機宜伏冀聖恩備賜詳覽今聞少誠病甚計必不起則淮西事勢與河北不同須别除人今正得便何者淮西不與諸賊鄰接四面盡是國家鎮兵勢力孤危援助懸絶重立賞罰必易指麾若萬一不從則可議征伐鎮兵足用事力自豐臣所以願捨鎮冀難致之謀就申蔡易成之計儻若河北四面命將不可淮西兩處用兵人既不堪其勞財又不給其費人情一阻時事難量脱鎮兾難兵事未如意蔡州有變勢可興師南北之役俱興財力之用不足儻事不得巳即須赦承宗則恩徳虚施威令頓廢不如早賜處分巳收鎮兾之心用赴機宜必獲申蔡之利時固難得事在不疑伏望聖恩俯賜裁斷論内庫錢帛憲宗即位後因徳宗府庫而性儉約節用四方進奉并破劉闢李錡沒入及于頔王鍔進獻錢帛盈溢充積内藏學士李絳嘗從容諌曰臣聞王者積之於人霸者積之於國尋常之君積於府庫陛下以超邁英姿嗣膺寶厯蠻夷納貢山澤効珍固當事冠百王徳垂萬代傳可書之事成不諱之朝今内藏積財來者必納唯願進入之數不聞聚斂之由方鎮皆裒刻於人以進獻為號因緣姦盗半入私家百姓積怨兆人興謗殆非今日聖政所宜行也又錢是通流之貨居之則物以騰踴帛是衣著之物貯之則嵗轉損爛此皆出於人力匪從天生積難得之財成無用之幣聖心所宜留念伏乞天慈量澤頒賜之所要校制作移用之所費三倍巳外悉付所司儻經用者有餘即租税寛裕外以令疲人蘇息内以表聖政光昭存之策書足示後嗣上喟然曰朕豈不知積財貨為不急之務受進獻非至聖之事顧祖宗理化之所法令賞罰不行今兩河州郡之殷是中夏貢賦之地四五十郡國力不及朝覲久廢征討未加又河湟郡縣沒於蕃醜列置烽候逼近郊圻朕方欲練智勇之将刷祖宗之耻惡所用不徵於人儲蓄之由蓋以此朕所以身衣澣濯不妄破用親戚賜與纔表誠意而巳且漢明帝云我為天下守財爾豈得妄用耶誠哉是言卿當深悉此懷論量放旱損百姓租税學士奏曰伏以聖慈憂旱務在䘏人將欲赦其流亡無如減其租税則下懷感悦上動陰陽昨正月中所降徳音量放江淮去年錢米臣聞所放數内巳有徵納從未納者又多流亡旱損州縣至今務放錢米甚少百姓未經豐熟復納今年差科疲羸之中徵迫不及人力困苦却在今年伏望天慈更賜憂䘏其江淮先旱損處作分數更量放今年租税當餒饉之際承雨露之恩感動人心無甚於此輒極愚欵上瀆宸嚴宣依奏施行請揀放後宫人學士奏伏以聖哲之君撫馭之要必順人情以作事感天意以致和從古巳來其道由此陛下勵精求理損巳推誠風動四方事貞百度作範來代掩美前王後宫之中人數不少離别之苦頗感人心怨曠之思有干和氣伏兾酌量所要矜放其餘使其親戚如初復得宫掖省費上以表大徳如天之施下以成羣生遂性之樂道映青史化洽皇風敢竭㳙塵庶禆萬一如蒙聖恩允許便請入德音後亦更論減放論德音事學士奏今日奉宣聖㫖如前臣等伏以時旱稍久聖慮時深思降德音除人疾苦比來方鎮過有進奉因此聚斂恣為剝害遂使百姓積怨愁之氣陛下有納進之名臣雖頻奏巳蒙寛納今特有處分使載在德音實王政之大猷為時事之切務上符天意下感人心和氣既通甘澤必應其合進奉外尚慮方鎮私有聚斂者但徳音嚴加約束如有違越令在必行仍令御史臺及出使郎官御史察訪聞奏比來制勑雖下多至因循不守患在賞罰不立不患朝廷不知聖心不移下誰敢犯其嶺南風俗百姓多賣買不得驅掠百姓為口禁止條約犯者依前令有司糾察聞奏横賊擾亂皆由於此今有明勑處分足以感動其心上幷依所奏施行賀德音狀伏以聖恩緣時稍􅄽旱特發德音誠意憂勤毎事節儉停罷進奉降免囚徒廄馬宫人既從減省私率公債又悉蠲除戒長吏之貪求禁逺人之驅掠大革時弊特出聖懷下感人心上符天意實帝王之盛事為史策之輝光斯則唐堯虞舜之明未過於此貞觀開元之盛復覩於今鼔舞億兆之歡心丕降至誠之徳意澤以周地陰陽之候自和徳既動天雲雨之施何逺臣等叨居近地獲奉聖時感抃忻歡實倍常品謝宣慰狀今日中使某氏奉宣聖㫖恩私俯降抃躍難勝伏以恩澤所覃積弊盡去事闗聖政感極人心臣等職忝禁闈喜倍常分奉章陳賀未盡懇誠曲蒙聖慈更賜宣勞感恩承命榮幸實深又謝宣慰狀今日中使某氏奉宣聖㫖以陰陽差序時雨􅄽期朕毎事增修兾感和氣卿等悉心奉上副朕憂勤今有甘澤與卿等同慰者臣伏以時雨既降百姓歡欣聖念猥加特使宣諭喜戴交集抃舞失圖臣聞唯天惠民陛下以自春巳來陽候稍亢慮成旱暵妨此農功憂勤之誠既形造次惕厲之志不忘寢興爰降德音大修政本過自克責勤求闕遺絶貢獻以字黎元務減省以崇簡易去當今之甚弊行歴代之所難發自宸衷曉示天下人心既感和氣自通曾未浹旬遂降膏雨公私暢茂動植生榮麰麥可望於豐盈耕耒不􅄽於節候康衢士庶鼓舞歡呼感荷皇恩致此甘澤則知憂先於事故能無憂事至而憂事故罕救此雖古先哲后修己備災引六事以責躬念一物之失所感應遄速豈過於斯臣等職忝禁闈親承宻命無裨萬一喜遇聖明理之當者無不行政之失者無不革累積盛美將至昇平感抃欣榮實倍常品謝宻賜宣勞狀奉宣宻㫖以臣所論奏事頗切時要特賜慰勞者臣伏蒙奨擢致於近宻茍有所見即合啟陳敢望聖明照臨皆賜俯察載降宣諭曲示恩私榮感交深兢跼無地臣所陳之事非止一端實政理之源繫安危之切兾望重於所忽防於至微則億兆生靈同慶仁焉臣無任云云論許遂振進奉請驛遞送至上都狀元和五年宣令許遂振詔允依來奏乘驛逓進奉者學士奏曰伏以本置館驛祗縁使命有司所支食料減刻巳恐不充今若進奉貨財悉令館驛逓送豈唯館驛不濟實慮州縣難堪且財貨數多差夫逓送便須防援轉益勞煩伏恐人力凋殘物議喧謗况館驛所破並是官錢虛有省脚之名實致擾人之弊儻若有利無害承前久合行之脱若諸道悉然即是制度紊亂事傷聖政不敢不言伏望與遂振詔中處分且依舊例庶望公私通濟事體合宜其詔草未撰伏望聖㫖宣依論不對疏上踰月不召對而學士李絳等上疏曰學非稽古才昧濟時陛下過聽不以臣等愚懵無取誤置於嚴宻之地職居肘腋任切腹心寵食太官之珍榮通禁門之籍糜軀致命詎報雨露之恩殉節忘家寜酬天地之徳所以繼獻章疏兾增日月之輝屢進懇誠希添海岳之廣而不量力分觸冒危機徒竭公盡忠忤犯嚴㫖雖死不悔當職所宜臣以謂忠臣不避罪以匡君正士不違患以汚道所貴上裨萬一仰酬顧遇實臣等之心也不識忌諱合寘嚴譴此又臣等之分也一月巳來未蒙賜召咫尺之地無申就日之誠跬步之間莫獲邀天之顧兢惕無地慙惶失圖臣聞管仲對齊桓公云大臣持祿不敢諌小臣畏罪不敢言下情不通此害霸之甚也臣等不言度日飽食過時既無切諫之尤復道如何伏惟陛下以社稷宗廟為心以四海萬姓為慮詢訪道理開納直言知好問而自通以博聞而自廣是天下之幸豈臣等之幸耶上覽疏令宣諭曰朕近者以方暑事繁所以不得召對卿等即宜明日于三殿對來延州事宜延州所管皆新蕃人比來部落擾動多因官吏貪尅失於恩信務於誅求致控制無方威惠不及塞門要地切在鎮安自朝廷初除延勞領延州衆情即以為未當其選今沙陀等果有不安撫馭之間必有所失恐日久轉弊須務逺圖伏望聖恩令别擇才識相當者充刺史辭對之日賜其誡勑兾種落懷附皇風宣暢俯接京畿使知典法謹具奏聞伏惟聖㫖宣依奏遂除渾鎬為刺史論簡勘楊憑家産狀學士李絳奏曰伏以楊憑犯贓憲司推勘舉正朝典肅清人心此蓋理之宜然法度之當爾臣但不知楊憑所犯輕重若所坐祗縁贓汚法令且有明文合待推勘事終後徵贓定罪今所與宗儒詔令一物巳上具數聞奏即宗儒受詔之日便合勘責家資逺近流傳有似簿錄凡簿錄家産皆是逆人至犯贓不合同例伏以聖恩再三立法度必歸至公事體之間貴於允當臣茍有所見不敢不陳宣依不用與宗儒詔命李相國論事集巻四
