body:
  text: 李相國論事集𫝊記類二名人之屬提要臣等謹案李相國論事集六巻舊本題曰深之文集唐李絳撰絳字深之隴西人擢進士補渭南尉厯中書門下平章事蹟具新唐書本傳今考其書乃唐史官蔣偕絳奏議之文與論諌之事雖以集名實魏徴諌錄之類也前有大中五年偕自序稱今中執法夏侯公授余以公平生所論諌凡數十事其所争皆磊磊有直臣風概讀之今人激起忠義始自内廷終於罷相次成七篇著之東觀目為李相公論事集云云其説本明此本標題殆後人𫝊寫所忘改歟偕序稱七篇今佚其一所存惟為翰林學士時四十六事為户部𫝊郎時四事為宰相時十五事共六十五條叙事樸掘頗乏文采謝狀賀表之類雜錄其間多與論諌無闗又批答賀屏風一條宣示李栻宻疏一條盛夏對宰臣一條皆憲宗之事尤與絳無渉編次蕪雜亦乖體例然遺聞舊事紀錄頗詳多新舊唐書所未載亦足以偹考核王楙野客叢書引其救鄭絪一條論採擇良家子一條謂足補唐書之踈葉夢得避暑錄話引其論吐突承璀安南寺碑樓一條訂唐書之誤是亦有禆史事之一證矣陸游集有此書䟦稱舊有兩本其一本七巻無序其一本一巻史官蔣偕作叙以序考之偕所序葢七巻者今一巻之本末見而此為七巻之殘本乃有偕序豈後人以游䟦更正歟乾隆四十四年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀李相國論事集原序公元和二年四月以監察御史選充翰林學士未幾改主客員外郎依前充學士逾年轉司勲員外郎來年改本司郎中依前充學士自始直内署周旋凢五年不獨以文章號令為應職意欲極直諫之道開天子之耳目致生人於仁夀以為巳任是時因抗言論事面命授中書舍人賜之金紫時憲宗固以為南司大用矣不逾年自户部侍郎遂平大政其後二十年間崇踐中外卒以剛鯁致奸凶之大禍大中初有詔史官差第元和間相臣五人将臣五人将命圖形以補凌煙二十四人之次有司即以公之名跡列在選中及上奏獨公之名留中不報噫自古忠臣不得其死者自兩漢王嘉李固至西晉張華如國朝褚河南裴河東之類剛毅不囘有類公之遺烈於公之生今中執法夏侯公乃授余以公平生所論諌凡數十事其所爭皆磊磊正直臣風槩讀之者令人激起忠義自始内廷迄於罷相次成六巻著之東觀目為李相國論事集下以楷模於後代上以顯元和聖后納諫之得昇平之運可惜其致云爾大中五年辛未嵗冬十月史臣蒋偕序李相國論事集原序
