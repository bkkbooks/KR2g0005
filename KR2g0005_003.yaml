body:
  text: 李相國論事集卷三唐蔣偕編上令宣示邪人事元和四年王士真卒其子承宗輒令軍府事中人承璀勸上興師討伐時事人情不願動衆蓋緣鎮州四面皆是叛渙之地事同勢合必難成功又以承璀統左右神䇿軍專征令諸道取其節度中外極諌言其不可前後二十餘度上意猶豫未決而宗正少卿李栻密上疏言承宗必須誅討承璀是親近信臣合委禁兵為統師諸軍不敢不伏上忽遣翰林使梁守謙把栻狀來謂學士等曰此是姦邪之人知朕欲令承璀領兵討伐承宗便希我意故進此狀卿等記之巳後不得輒令進用若非應期聖哲何以洞鑒事情豈尋常守成之君所可擬也論讒毁事學士奏事極論宦官權幸侵害政事搆毁忠正誷惑聖聰上曰此輩從古而有非朕特置也其何敢誷惑搆毁朕豈用其言哉學士對曰陛下不信試取聖意素所美之事假以上旨為惡聞之即為不顧事實好惡便隨順聖心而言此豈忠信所為實傾邪也中人本性唯在財利若趨邪行賄者雖事類蹻跖致如豺狼而因便陳啓悉謂賢才若守正不通者雖行同顔閔理等龔黃因事中傷謂之貪冒不知仁義不分邪正此其天性也臣不敢言聖意知其如此遂其喜怒蓋以常在左右積於狎習能用傾巧之智搆成疑似之端上聞而怒之因而信之却謂之公也如此事狀備載史言巧拙為真今古同病上曰此等是朕奴豈有信其毁譖如有此事卿等一一奏論朕當處置勿希朕旨論鎮州事宜奉宣今因鎮州事勢朝廷欲自除人如何學士奏曰臣等伏以河北專有土地父子相承每思此事常所憤歎自聞士真亡沒夙夜思量誠願别議除人以去久弊然以朝廷法制初立須慎事機度其萬全方可處置伏以自武俊父子相承至今四十餘年軍鎮人情慣實巳久兼聞士真有子久領兵權今别除人深恐未可况范陽魏博易定淄青皆是父子相承實同流類鎮州若有革易此輩必不自安茂昭雖有所陳亦恐未得甚信竊料四鄰節度多有此心必謂進退之間皆有何所利者若鎮州除人人得其便以此為功名若勑命萬一不行因此却相交結在於國體不可便休即須備守封疆兼議討伐因此節度使必加封賞軍士亦須給資糧賜臣以知其四鄰進退有利况今江淮水旱財不充力陛下方切憂勤猶思賑恤當於新以河北近來稍加恭順當其畏威懷德之際示以含𢎞光大之恩且令士真之依師道例充留後既推恩信且獲便安近日師道最奉朝廷猶奏小男引方充副使則鎮州未可改易事理灼然但國家財力漸豐德化漸及他時制置必易指揮臣等慮及此事巳具聞奏纍日思量非不審細利害得失斷在不疑伏望聖恩俯賜詳鑒上鎮州事奉密宣今欲與承宗留後便割鎮州管內德棣兩州别置一鎮又欲令人諭承宗遣依師道例送兩稅卿等商量如何者學士奏曰臣等竊以鎮州專有土地四十餘年軍鎮人情久以附著今若别議割𨽻承宗不安軍情又阻憂疑怨望以此為辭官爵恩澤悉為虛棄儻割𨽻之際萬一遲回事體之間倍難處置况鄰近數處情狀皆同料其中心亦憂分割若潛計會必有拒違朝廷計謀須審利害捨小取大斯為逺圖臣細思量必難割𨽻其兩稅官員等伏望聖恩授承宗後因弔祭使鎮州日令出自其意以諭承宗使其感戴恩造若引師道例不欲令知出自聖旨倘或自效理固合宜若事或不行體亦不損臣之愚慮敢不竭誠伏望聖恩俯賜詳鑒又上鎮州事密奉進旨今劉濟季安皆有疾患忽有故者不可盡如鎮州例皆與其子今欲乘此便鎮州别除人如不可即議用兵議者皆以為然恐卿不細知彼事情宜審商量奏來勿錯誤者學士奏曰臣等再三思度敢不詳審伏以鎮州人心固結難即改移鄰境事同必相扶會當其無事則相疑沮見有改易則却同心意者以子弟為謀他日還慮及此情狀可見事理昭然今若欲除大臣守鎮臣愚必知未可不如且示懷撫以收其心所以頻有奏陳伏兾俯存含忍實慮别除人後制命不行即須興師且事征討蓋以江淮水旱人力困窮陛下每切憂勞尚加賑恤財賦所入經用不充今若鎮州用兵須令諸處進計用兵數供費巳多萬一四鄰之中同類潛相扶結相為影援延引嵗時則為患益深所費轉廣縱陛下悉出府庫以給軍須若更淹延將何及計兵連之後勢不得休北狄西戎素多姦狡忽乘間隙侵犯邊疆又須興兵以事防遏首尾應敵則內外憂危臣等必知興師未可自陛下臨御天下諸州連帥頻建軍功言事者不計始終喜功者輕議討伐今鎮州事勢與劉闢李錡不同何者劒南浙西本非反側之地劉闢李錡暴生狂逆之心唯以財貨誘人人心本無結固又四面皆是國家兵鎮事與河北不同所以懇請誅討料其事勢舉必萬全今鎮州事宜與此有異外則結連勢廣內則膠固嵗深以此用兵必為不可其劉濟季安雖有疾患至於事體與鎮州略同若亡沒之後或别有其便即相其便可否臨時裁制伏以崇勳盛烈底定四方必有其時可以斷致自鎮州有故臣夙夜思量誠願因其此時收得一道事有未可不敢因循瀝竭肺肝備陳愚欵貴得萬全之計上酬不次之恩事之安危伏兾聖慮所切惟望不納浮議斷在宸衷臣不勝懇切之至論盧從史請用兵事學士奏從史比來事迹彰露頗多意不自安務欲生事所以曲陳利害頻獻計謀兾許用兵求姑息今親領士馬欲往邢洺假以就糧實為動衆去就之際情狀可知伏願聖德備詳端緒用絶其情不許此行事臣愚竊料從史必更密陳利害求動師旅為輸忠誠茍私於身非利於國更有奏請伏望以此隄防澤潞事宜學士奏臣昨巳具狀陳烏重胤不可便授以澤潞請與河陽却除孟元陽澤潞臣進狀後至日晚方見承璀文狀奏行營事宜其烏重胤承璀巳為與文牒令句當留後詳覽驚歎實所痛心且澤潞五州據山東要害河北連結唯此制之磁邢洺三州入其腹內國紀所在實繫安危比者磁道為從史所據凶狡情狀昭然可知比年與劉濟王士真相結又奏其男充都知兵馬使如此姦狀聖情具知今地降虛陛下神略坐致凶惡却收一道奈何欲與重胤却棄此鎮陛下昨追從史者度於利害須以計擒然於國家巳失大體今澤潞重鎮承璀輒以文牒便差人留後遽請旌節無君之心孰甚於此陛下昨收澤潞人神同慶國柄再立制度重顯今忽與本軍將物情頓沮朝經大紊自削形勢却恐不如從史向者從史雖懷蓄姦蠧巳受朝命方鎮今重胤一時素無功榮承璀一牒使河南河北諸侯聞知憤怒之心必生言語蓋以專權日久莫不各有將校且懼且恨必謗朝廷皆謂重胤與承璀交通作計遂却從史代其使主便與節度豈唯事同致怒實亦人情難堪儻劉濟茂昭季安執恭韓𢎞師道耻有名位與重胤同列繼有表章陳其情狀并承璀專授重胤之罪不知陛下何以處之若總不答即方鎮之心大阻若别處分即朝廷之體頓虧是令承璀取怨天下從史以澤潞不容遂至狼狽若承璀為天下不容何以自保或恐因此遂亂今重胤便除河陽亦是望外之福况新有從史事豈慮重胤遲回重胤所得方隅巳是承璀之力元陽若與澤潞又是事望所推不唯忠義堪為腹心兼有才略實可委任兩河方鎮亦必欣歡朝廷制度又再修舉利害懸逺事在不疑况重胤須為從史結託劉濟士真搆間虛亂為國生事至使聖恩特遣朝官委曲宣諭僅得寧止如是則事迹固無逺大臣豈與重胤嫌隙豈與元陽有親故蓋為社稷之計朝廷之勢可惜爾伏望聖恩斷在不疑與重胤河陽足以賞逐從史效與元陽澤潞足以壓河北諸侯之勢朝廷收得威柄承璀免有負憂責機便易失時事難遇伏望定於神慮遂此至公臣等懇切陳不避忌諱者伏以獲居近密特授恩光若緘不言上負陛下伏惟聖慈俯鑒愚欵速降制命以副人心奉宣悉依卿處置澤潞節度使學士奏守謙密言聖恩商量以昭義兵馬使烏重胤部置軍中事不獲巳須與節度使者臣竊以此處置實非所宜比者以從史受命不由朝廷遂至生彼邪心致兹惡迹今重胤驅逐從史忽領旌旄兩河聞知必生怨望謂陛下密以官爵誘其將校逐其主帥人情疑懼國體巳傷若以重胤主兵勢須便與即是威福不在朝廷於事體之間與從史何異議者若曰重胤見主權必不受制臣觀事勢實恐不然何者伏緣從史懷惡蓄姦誷上違命所以重胤得效義獻欵以順為名其衆遂伏今重胤若不顧憲章以力取位即其同列寧息偏辭儻失衆心前事豈逺以此事理必無異圖縱軍中有狀請與重胤此時之事必非忠心其流輩既多當不願重胤獨得别與一鎮少愜衆心伏望聖恩先令密諭重胤授以河陽節度使除元陽澤潞節度使則人情大伏國體得全且重胤忽自軍將校授以河陽拔於行間恩生望外豈於此際便有遲回棄義虧忠違福取禍雖至愚下亦必不然元陽功效素髙公望又積澤潞接近久亦承風今若除授便徑入潞府慰勞將士家口恤其貧乏各使安存三軍聞知自然感悅重胤既得方鎮元陽又愜人心如此處置必無差誤機事可惜實所痛心威柄一失豈可復得伏望聖恩不以臣愚昧特賜省覽斷自宸慮成此聖功輒敢獻陳伏候聖旨奉宣依卿所奏施行張茂昭事學士奏伏以茂昭舉家朝覲河北都無此例雖本情自任不得在外體殊可嘉稱須降恩榮以存激勸今迪簡除易定節度茂昭便是前衡行理之間恐非穩便又所隨將健悉屬定州茂昭寂寞於體非宜伏望聖恩速除茂昭一官并專使宣諭從將校悉令取茂昭處分到京别有進止如此處置實協事情謹具奏聞伏候聖旨奉宣依所奏遂除河中節度使李相國論事集卷三
