body:
  text: 李相國論事集卷二唐蔣偕編學士謝狀臣絳等今日伏蒙聖恩召對特賜延納過有奬諭又奉宣聖㫖卿守職盡忠常如今日朕何憂天下不理又伏見襄陽進奉出付所司安國寺鑄聖容處又罷臨幸者親奉德音旋蒙宣諭目覩盛事心感皇明喜戴交并抃舞失次伏以陛下憂勤庶政推以至公容納直言事惟求當臣等恭守職分自合罄竭愚𠂻豈望天眷綢繆特加奬諭感恩激切百倍常情至於慎守德音出外方之獻嚴重清蹕罷近寺之游此皆發自宸衷卓然光大足以動四方之聽感萬國之心臣等職在禁闈時逢昌運以欣以忭意不能宣論栁公綽事御史中丞栁公綽與宰臣不協為所陰中憲宗因對學士李絳忽云栁公綽逐突臺中公事不理我與一逺郡刺史以勵後人何如絳遂奏曰自栁公綽為中丞公議皆云稱職性素強直不依附於人衆傳掌權之人有忌者輒欲去之伏望聖意審詳根繇上大悅曰誠如此且任之如有闕敗去之何如論裴武事京兆少尹裴武銜命使鎮州令諭王承宗割德棣兩州歸朝廷武飛表上言一如朝廷意㫖遂除承宗所署德州刺史薛昌朝為德棣節度令中使賫旌節授之而魏博田季安得飛報先知之遽報承宗言昌朝與朝廷通遂星夜追昌朝德棣州節度及旌節至魏州又為季安留連得為宴樂停七八日而昌朝尋巳追到鎮州朝命遂不行比及武使回事宜與先上表參差并言人譛傷武云使回宿宰相裴垍宅遲明方見憲宗大怒乃召學士李絳因顧問奏對畢上顔色甚震怒曰裴武誷我茍求脫於賊中上言不實令我制除薛昌朝今果不受又使回未見先宿裴垍宅須左除嶺南逺處絳因奏言裴武甚諳練時事往陷在河中李懷光賊巾事跡可稱今所銜命不合絶有乖錯大底賊多變詐難得實情以臣愚慮思度王承宗恐國家必有征討請割德棣兩州且得安全尚有四州之地亦足保其富貴求安之計必是此心然鄰道魏博東平范陽與王承宗勢同事等恐他時亦為朝廷所割必是為鄰國所搆兼以利害鼓動之不得守其初心此必然之理也伏望且尋訪之裴武所上表只得上承宗初時意便且奏來後又恐鄰境脅制誘動遂有後變計裴武不敢不盡其心今陛下擇裴武使凶逆悖亂之邦一不如意便有貶責臣恐今後奉使賊中無復得誠實其後奉使者皆以武為誡依阿可否之間必曰其言及表章則如此其深心則臣不可保不可顯言是非陳列事狀若朝廷不得實狀别處置或有錯乖非國家所利也若受賊中財賂言語不實則須重責以懲姦欺又言先於裴垍宅宿裴武久為朝臣具諳制度裴垍身為宰相特受恩私若其未見便而宿宰相家固無此理昧劣於此兩人猶不敢至是况皆是詳陳時事之人計必無此時必有構傷裴垍裴武陛下不可不察上良久曰誠有此理事合從寬更不用問武得守其位論鄭絪事上御浴堂北廊召學士李絳對顧問畢上曰有一事甚異朕比來未能言之鄭絪身為宰相事朕不盡心朕與宰相商量欲詔盧從史却歸潞府續追入朝鄭絪輒漏泄我意先報從史令其陳奏潞府無糧三軍且請山東就糧為人臣豈合有此事耶故事合如何處置絳對曰若實有此事雖以誅族於陛下未足塞責復曰陛下從何得之計鄭絪必不自泄從史必不自言陛下先知何以得之上曰吉甫密奏絳對曰臣與鄭絪先後懸殊不相往來臣約其事體必無此理鄭絪甚讀書頗識事體時稱佳士素有美名雖不知其才術如何至於君臣大義不合不知去就若身居宰參陛下密謀便敢泄之於姦臣雖術同犬彘性如梟獍亦不合至此况絪頗知古今洞識名節事出萬端情有難測莫是同列有不便之勢專權有忌前之心造為此辭兾其去位若不過陳危事安得激怒上心伏望陛下深賜詳熟無令人言陛下惑於讒佞也上良久曰亦應如此朕幾誤為處分至是遂巳論白居易事上召學士於三殿對奏論政事拾遺白居易言事抗直曰陛下錯上色莊而罷令翰林使密宣承㫖李絳對上曰白居易小臣不遜須令出院絳因切論曰臣聞主聖臣直宥過莫大自陛下開納諌諍容受善言小臣然後敢極論得失從而怒之則是緘其口若從順陛下則安敢發言論况居易所言志在裨益言雖太直事涉不私伏恐衆議以為陛下惡聞直諌斥出正人非所以發揚聖德納諫諍也上悅曰依卿所奏遂待之如初論國學疏學士李絳上言自三代哲王巳降奄有天下未嘗不崇建太學尊重名儒習干戚羽籥之容盛樽俎揖讓之禮以興教化以致太平天子親入視學皇太子行齒胄之禮斯所以用化成天下也故記曰如欲化民成俗必繇學乎當征討之急則先武事丁治平之運則尚文德二柄相須百王不易故漢光武於兵革之中投戈講藝魏太祖於擾攘之際崇立學校歷代之於儒道如此急也後漢儒學之盛大學至有三萬人諷先聖之言酌當代之務鴻名碩德匡國濟時未有不游於太學以躋顯位也國家自髙祖初平關中便修太學并為功臣宗室子弟别立小學建黌舍大𢎞儒訓增置生徒各立博贍鴻儒碩學盛於朝列質疑應問酌古辨今咸徵經據傳並得師法故朝廷無不根之論蕃夷有慕義之名風教大行禮樂咸備貞觀之理謂之太平至於開元中亦𢎞國學之制復覩儒道之盛故太學廢於衰亂之代非所以俾風俗趨本末而忘實蓋繇國學廢講論之禮儒者靡師資之訓自是以降不本經義不識君臣父子之道不知禮樂制度之方和氣不流悖亂遂作其師氏之廢如是之害也今天下遭逢聖明蕩滌瑕穢前代所不能舉而陛下舉之百王所不能行而陛下行之萬方傾耳兆人企踵思陶聖化希承德風而德盛道隆闕絃歌之雅詠政流化洽鮮儒學之髙風頃自北方騷動乘輿西幸中夏凋耗生人流離儒碩解散國學毁廢生徒無鼓篋之士博士有倚席之譏馬廄園蔬殆恐及此伏惟陛下挺超代之姿發振俗之令復崇太學重延儒碩精選生徒奬寵博士備徵天下名德專門之士增飾學中屋室厨饌之制殿最講習之優劣彰明義訓之得失明立科品使有懲勸拔萃出羣者縻之以祿廢業怠教者置之以刑自然儒雅日興經典日重先王之道日盛太學之訓日崇陛下垂拱明廷受釐清禁使師氏教德不獨美於周時橋門觀禮豈復謝於漢日伏希天造特覽愚言起兹廢墜𢎞於教化兾禆聖政少助皇風上於是宣付中書門下令修起國學執事者以為虛文不能將明主上之意遂因循而巳論諌諍事學士李絳浴堂論事畢上曰近日聞諌官諌事頗有不實言事朋黨多涉謗讟須逺貶三兩人甚者以勵其餘絳因對曰陛下此言似非聖意恐有邪佞之人以誤天心且自古聖王未嘗不納諫則昌拒諌則亡故夏禹拜昌言漢武延直諌所以光於史策也史傳備載歷代帝王置敢諫之鼓立司過之吏木鐸徇路以采風謠之詞商旅謗市以詳得失之政故成湯聖德格於皇天而稱改過不吝顔回希聖四科之首而美不二過則知雖至聖賢不免有過所貴能改不至順非若無諫諍何以知過故書云汝無面從又曰從諌如流昔太宗以聖武削平天下奄宅萬國而懼臣下不諌誘之使言至於李大亮孫伏伽之儔皆以上疏諫事並蒙褒奬魏徵王圭事大小皆獻直言諫諍切直用裨聖德故太宗振英聲於萬古王魏流芳名於千載未聞堯舜禹湯文武之君洎我太宗窒諌路以自擁蔽不聞其過唯失道之君惡聞巳過夏桀殷紂周幽秦皇以拒諌飾非反道敗德直言者謂之誹謗正諫者謂之妖邪忠臣結舌端士養跡故不知巳過遂至亡國向者四君招諌使言聞過輒改易覆車之轍啓忠臣之心則當政化益光宗社永固殷湯周武安得有鳴條牧野之戰戎人漢祖安得有驪山軹道之師且今補闕拾遺天后所置使在左右司察得失昔施之於女主今黜之於聖時國史之中何以示後微臣竊為陛下惜之夫臣下貢言於至尊如天臣卑如地加以日月之照雷霆之威小臣晝度夜思將有上諌本欲陳諌十事至時巳除五六逮於緘封上進又削其半其得上達者十無二三何哉啓忤意之言干不測之禍顧身無利相時避禍者也自非聖主知直言有益於巳正諌有禆於時溫言容納奬勵勸道忠臣抱義不顧其身懷忠不避其禍茍有致君濟時之益不識觸忌冒諱之誅何哉盡節之臣竭忠之士顧食君之祿推事君之道而致然也其君上納忠如是之急也臣下上諫如是之難也所以明主須宥其過恂恂納諌切言者賞之使必進極諌者褒之使必行然後聖德光明大化宣暢今黜責諌臣使直士杜口非社稷之利朝廷之福也陛下詢於微臣不敢不陳愚欵上曰非卿此言我安知諫諍之益也奏事上怒旋激賞事學士李絳於浴堂北廊奏對指切時弊有忤上㫖及論中官縱橫方鎮進獻事宜上怒甚頭面俱赤厲聲曰卿所論事何太過耶絳奏論不巳曰所奏陳事理豈臣身之利是陛下之利陛下不以臣愚昧使處腹心之地豈可見事虧聖德致損清時而惜身不言仰屋竊歎是臣負陛下也若不顧禍患盡誠奏論旁忤幸臣上犯聖㫖以此獲罪是陛下負臣也且臣與承璀素不相識又無嫌隙祗是威福太盛虧損聖明故不敢不言也使臣緘默非社稷之為福也上見絳誠切不回怒色却散乃慰諭曰卿盡節竭誠議於國人所不敢言卿悉言之朕聞所不聞知所不知真忠正誠節之臣也疾風知徑草卿之謂矣他日南面亦須如今絳遂拜謝而退上遽令與改官遂特授中書舍人依前翰林學士異哉論事過則怒正理當則悅不遷於事唯在於公息雷霆之威布陽和之德非憲宗至聖孰能如是哉論中尉不當統兵出征疏元和四年上令左軍中尉吐突承璀統神策軍討王承宗節制諸道兵馬翰林中縷陳從古無令中人統各鎮師徒諸道受其節制者師出不律軍必無功前後諌論一十八度後宰相論亦不允遂依上㫖乃令學士李絳撰白馬其日絳又進狀稱事實不可適有進㫖召翰林學士梁守謙上手執一紙文書云宰相悉言可任承璀而學士不肯如何遂令中書出勑夫以人主之威承璀之寵兵戎之重事學士之微品天威下臨遣其草制復有何難而固循道理愛惜事體至於手執相府狀令中書出勑不怒學士所守深察盡忠之誠雖古先哲王何以及此踰嵗承璀果無功旋師更寵授開府儀同三司依前中尉絳謂諸學士絳繆蒙恩奬超越諸公嘗思報恩不顧獲罪今吐突啓用兵之端無擒敵之功傷人費財貽國大耻虧損聖德汙辱史策此事須上論不敢回避履危之餘絳自上疏不敢有纍諸公遂上疏極諌其略曰且其擾改師徒陷沒將校衆情羣議必謂陛下正其刑典懲之後來今反極寵榮重加崇秩巳後更有敗軍失律之將蹈利干賞之夫則何以處之若誅之則罪同而罰異王法之不一也若捨之則保身而玩國政典之不行也伏望心割不忍之恩舉不刋之典責無功之罪追不次之榮使備邊之將有所懲勸當危之士無復顧望實天下幸甚疏既入絳謂諸學士曰此疏事合分陳豈得顧念禍患少當貶責便從此辭遂於本閣取前後所上章疏稿草悉皆爇毁俟命而巳隔兩月承璀遂罷左軍中尉以散伍就院然後相賀抃舞聖明憲皇割恩務理從諌納忠如是天下仰觀日月謂之中興太宗𤣥宗之盛無以過此也李相國論事集卷二
