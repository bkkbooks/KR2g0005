body:
  text: 李相國論事集卷一唐蔣偕編論李錡財産請代浙西百姓租稅狀元和二年浙西擒李錡伏法准舊例籍其家財産業送上都翰林學士裴垍李絳等上言曰李錡凶狡叛戾僭侈誅求刻剝六州之人積成不道之名陛下哀憫無告為之弔伐變愁怨之氣為發生之和歌舞聖時負戴恩德其李錡家所積錢帛皆斂於人或有酷法寃濫之弊死其身取其貨或有枉法徵剝之吏加其罪納其財前後事狀布聞逺邇聖恩本以叛亂誅討蘇息一方今輦運錢帛布聞四海非所以式遏亂略惠綏困窮也伏望天慈下痛哀之詔降雨露之澤將逆人財物並以賜本道代浙西百姓今年租賦則萬姓欣戴四海歌詠上覽狀嘉嘆久而從之論請驛遞赦書狀元和三年三月御丹鳳樓大赦天下知樞密中使劉光琦黨庇同類奏准舊例散差中使走馬往諸道送赦書所貴疾速意欲庇假其類使至諸道受納財賂俟其至也自獲其半翰林學士裴垍李絳等奏曰陛下自臨御海內事推至當易去煩苛今復以赦書散差勑使專送是求方鎮財物蓋非陛下意㫖請付度支鹽鐵急遞發遣既得疾速簡便又無求取勞擾上依絳等所奏光琦又奏曰舊例如此難便改易上曰舊例若是即須恭守若不是即須改移豈可循舊弊耶宜依裴垍李絳所奏自此衆情必知慮事可以理奪真致治之英主也故言時事稱貞觀開元元和之政焉請立皇太子狀元和三年學士李絳上言曰古先哲王以天下為大器知一人不可以獨理四海不可以無本故立皇太子以副巳設百官以分職然後人心大定宗社永寧有國家者不易之道也陛下嗣膺大寶四年於兹矣而儲闈未立典策不行是開窺覦之端乖重慎之義非所謂承宗廟社稷也且漢魏故事國朝舊制懸諸日月著為憲章伏望陛下抑撝謙之小節行至公之大典用興儲副永固邦家則主鬯承祧必光於萬代問安侍膳道播於百王上曰朕以菲薄獲守社稷而虔懇未通於天地孝誠未達於宗祧而遽示天下私先及於子孫朕甚惡焉然以卿忠誠纍有陳請援引祖宗制度援引經典憲章事重禮崇瞿然增惕宜依所請遂下制司擇日備禮册命即惠昭太子也謝宣慰狀今日奉宣聖㫖以立皇太子制下特賜宣示臣者祗奉詔命歡抃失容伏以時屬升平運逢交泰陛下思固大本以承鴻休爰命元良式昭茂典無疆之祚惟永至德之光日宣億兆生靈鼓舞欣戴臣猥惟淺陋獲奉軒墀特降眷慈俯賜宣示以榮為荷百倍常情論安國寺不合立聖德碑狀元和四年盛修飾安國寺左軍中尉功德使吐突承璀令僧惟應等連狀奏請立聖德碑承璀恩澤無二言無不行遂先立碑石大小髙下一准華陰嶽碑及堂構克成承璀奏請學士撰碑文且曰臣以排比一萬貫錢充送撰文學士有進㫖令學士司勳員外郎知制誥李絳撰於是絳與諸學士議以自古聖帝明王無聖德碑豈德不逮與蓋以謂不宜刋勒且示聖德有區限也及同狀上論其㫖曰陛下布維新之政剗積習之弊行前王所不能行革歷代所不能革四海延頸日望德音今忽自立碑以示天下不廣彰滿假之漸招矜炫之譏大易稱大人者與天地合德與日月合明執契垂拱勵精求理化成天下髙視百姓豈可以文字而盡聖德又安以碑表而贊皇猷若可叙述是有分限乃反虧盛德豈謂敷揚至道哉故堯舜禹湯文武無立碑之事至秦始皇荒逸之君煩酷之政然後有置嶧山之碑揚誅伐之功紀巡幸之迹適足為百王所笑萬代所譏至今稱為失道亡國之主豈可擬議於此哉陛下嗣髙祖太宗之基舉貞觀開元之政思治不遑食從諫如順流固可與堯舜禹湯文武方駕而行安得追秦皇暴虐不經之事而自損聖德近者閻巨源請立紀聖德碑陛下詳盡事宜皆不允許今忽令立此碑與前頗乖可否相違是非殊異况此碑既在安國寺中即叙載游觀崇飾之事述游觀且乖理要叙崇飾又非正經固非哲王所宜行也伏乞聖慈特寢罷臣等職忝近密理合獻陳庶申葵藿之誠兾增海嶽之大謹奏其日晚奉宣進㫖覽所陳深歎忠鯁巳依所奏不令造立其碑樓遣令拽倒訖想宜知悉勑使宣了學士相視不凖擬一狀便行尋問勑使如何拽倒曰聖人覽狀時承璀正在旁立上處分令拽倒承璀云碑樓功積大卒拽不倒欵緩令拆意欲延引候方便再論上厲聲曰多著牛拽乃不敢言遂以百牛拽倒某是旬當了奏聞便令宣與學士上問得賢興化事對上嘗御浴堂北廊從容言曰朕閒覽前史見興化致理之主奉公竭忠之臣未嘗不加興歎想其風彩洎我貞觀開元之化備在青史垂於不朽朕不量菲薄欲庶幾仰承祖宗之道追蹤古昔之風將釣拔俗之士致濟代之才舉兹凋瘵納諸仁夀邊境靡烽燧之驚郡縣無愁怨之音禮樂興行盜賊屏息無忝諡號不為宗廟之羞何行而可以致是也學士李絳對曰陛下興聖懷發德音追帝里之髙風紹祖宗之丕烈思延釣築之士想致唐虞之化非臣凡近愚昧所宜獲承聖言而祗應清問也臣聞聖人與天地合德日月合明思發於志故易曰出其言善千里之外應之况其邇者乎又曰先天而天弗違後天而奉天時天且不違而况於人乎昔周成王泣啓金縢皇天為之反風宋景公誠發德言妖星為之退舍天人相應今古同時記曰川澤通氣山川出雲嗜欲將至有開必先言聖靈相通有感而應也今陛下以上聖之資撫易化之運積勵精思理之志求希代濟時之賢感於誠懷勞於夢想言出於口行加於人神祗將必效靈才彥固當接武豈惟殷宗求於傅說周文獲於渭濱願言必從志誠斯感惟聖人為能之抑臣又聞奏必觀其實不觀其文信其行不信其言若欲天下副陛下之誠從陛下之化自非聖躬行之以導其下則無繇而致未有表正而影不直聲鳴而響不答也今陛下以常士之禮而待拔俗之賢以九品之祿而望超代之器是繇垂蝸蚓之餌以釣吞舟之鱗設弓弋之􅗤以羅垂天之翼固不可得而致也昔文王養老而伯夷太公出昭王禮士而鄒衍樂毅至故必身先之以誠至之未有不應者也陛下誠能正身勵巳尊道貴德親信端士逺弃邪佞盡忠進直者奬之希合從諛者斥之與大臣言敬而信之不使小人參其事與賢士游親而禮之不令不肖者搆其隟唯義所比不論親疏唯仁是行不論貴賤去冗官無益於時者則祿及才能矣出宫女之希御幸者則時無怨曠矣簡繁數之儀則禮得其節矣除靡慢之奏則樂得其和矣將帥廉則士卒勇矣官師公則治化洽矣法令行則下不違矣教化篤則俗必遷矣如此則聖問周達德聲遐宣可使金石孚變鳥獸率舞而况於人乎則必賢哲慕義英彥赴響伊尹必負鼎而來呂望必投釣而起由余必弃戎而委質寧戚必捨牛而效用三傑成功於髙祖四七展才於光武龍吟則山雲起虎嘯則谷風生自然之應也然後陛下坐明堂朝羣后興教化作禮樂正風俗厚人倫逺比堯舜興崇近與祖宗合德時臻至理代稱中興則向者聖念所思睿心企及何逺之有哉唯陛下勤行之爾若言之不至無至也伏惟陛下念之伏惟陛下勤之而巳上曰美哉斯言朕當書之於紳因有進㫖檢自古明君賢臣亂君邪臣事跡造屏風焉造屏風事元和四年勑學士令檢自古明君賢臣亂君佞臣事跡作屏風三合其圖畫美惡題寫其事朕施於便殿坐卧觀閲用為鑒誡以自省察學士李絳崔羣錢徽韋𢎞景白居易等檢討事跡如文王得呂望以興周桓公任管仲以霸齊宣王誅阿大夫京房對漢元帝周幽王嬖褒姒而為身禍秦二世惑趙髙以亡天下陳後主方事七獵遂以亡國朱异勸梁武帝納侯景臺城遂陷如此之類都五十餘事造屏風三合具列其事進入并以狀稱賀上大悅乃令中使將出中書以示宰臣百僚上章賀即日張於便殿朝夕省閲顧左右中人指示曰汝等大須作意不得有如此之事進歷代君臣事跡五十條狀元和四年奏臣等先奉進止令撿尋歷代至國朝巳來聖帝明王忠臣義士君臣合體事跡可觀者撿五十條進呈欲於御座署屏風觀覽者伏以自古聖王皆憂勤庶政未嘗不取鑒於前代致理於當時昔太宗亦命魏徵等博採歷代事跡撰羣書政要置在坐側常自省閲書於國史著為不刋今陛下以天縱聖姿日慎一日精求道理容納直言猶更參驗古今鑒誡美惡朝夕觀覽取則而行誠烈祖之用心必致貞觀之盛理臣等謹依撰録都五十條賢愚成敗勒為兩卷隨狀進上其羣書政要是太宗親覽之書其中事跡固備伏望德政日新成不諱之朝致無為之化批答宰相等賀忠諫屏風朕以負荷至大惕厲每深常所憂勤豈敢暇逸雖卿等竭忠獻替藎臣之救既多而朕亦追想聖明諫諍之規是渴所以列其事跡文以丹青嘉乎匪躬凛然在目庶以發揮寡昧辨察正邪置之坐隅所期於外奬示於卿等但表於中懷詠之清風企以從政豈惟斯美得在前人卿等道極致君才周濟物弼違義激於藥石成務功格於神祗事合公忠言形將順周省陳叙深覽誠明所賀知悉論裴均進銀器狀元和二年春德音天下方鎮因緣進獻裒刻百姓賦斂煩重外以進奉為名內以貨財為事遂有痛哀之詔斷藩鎮非時進奉其夏季襄陽節度使裴均素交結內官恃其援助遂進銀甕銀盆之類萬餘兩憲宗因事繁誤納於內學士李絳等論奏云陛下聖明之德超邁百王英特之姿跨越千古察百役之繁猥愍萬姓之愁苦念杼軸之積弊知姦臣之徇私外以進入為名內以賄遺為計厚斂於下半入其家所以特降鴻恩大拯頽俗罷方鎮不時之貢禁天下無藝之費蘇息下民革除宿弊頒宣之日遐邇必臻感恩涕泣仰聽歌舞更相謂曰不圖今日復覩聖時利澤布於四海德施周於萬類家吟户詠氣舒目明才及數月今自廢罷受納裴均所進銀器天下之人皆謂詔書不信必謂陛下以財貨為先此人非益於聖德也其裴均行不繇道姦以事君固違制書敢進銀器此是試陛下之意若不容納必知英主不可以利啖則須恭守典憲尊朝廷若為受領則知聖懷必可以財動因此厚斂於下此不忠不誠之大罪也倘陛下以裴均位當藩鎮官極崇顯未能行法以懲姦人伏望准制書令度支收納既不違勑文又免入內庫無虧聖政以示外方上覽疏驚曰我事繁都不記得許令受納是我誤也所進是赦書未到前發來裴均特赦其過依卿所奏便送納度支收管其日遂令中使押領銀盡於中書宣示宰臣云裴均違勑進此銀器緣其赦書未到前巳在道路所以特赦其過並令送納度支所宜知悉宰臣驚悅進狀稱賀中外皆喜上之從諫求理焉李相國論事集卷一
